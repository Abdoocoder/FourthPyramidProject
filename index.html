<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fourth Pyramid Backend — Status</title>
  <style>
    :root {
      --primary: #265e97;
      --bg: #f7f9fc;
      --surface: #ffffff;
      --text: #191c1e;
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: var(--surface);
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 12px 40px rgba(0, 28, 56, 0.05);
      text-align: center;
      max-width: 400px;
    }
    h1 {
      color: var(--primary);
      margin-bottom: 0.5rem;
    }
    p {
      line-height: 1.6;
      opacity: 0.8;
    }
    .status {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.5rem 1rem;
      background: #e7f3ff;
      color: var(--primary);
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.9rem;
    }
    .status-footer {
      font-size: 0.8rem;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Fourth Pyramid</h1>
    <p>Backend Logic & Supabase API Client</p>
    <div class="status">● Dev Server Running</div>
    <p class="status-footer">
      The backend is fully configured. You can now use the library by importing from <code>src/lib</code>.
    </p>
  </div>
</body>
</html>
